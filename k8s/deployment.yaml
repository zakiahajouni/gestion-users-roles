apiVersion: apps/v1
kind: Deployment
metadata:
  name: gestion-users-roles
  labels:
    app: gestion-users-roles
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gestion-users-roles
  template:
    metadata:
      labels:
        app: gestion-users-roles
    spec:
      containers:
        - name: gestion-users-roles
          # Assumed image name — replace with your registry/image tag if different
          image: zakiahajouni/gestion-users-roles:0.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
